services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: relayos_test
      POSTGRES_USER: relayos
      POSTGRES_PASSWORD: relayos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relayos -d relayos_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  test-target:
    build: .
    environment:
      DATABASE_URL: postgres://relayos:relayos@postgres:5432/relayos_test
      TEST_TARGET_API_KEY: ${TEST_TARGET_API_KEY}
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:$$PORT/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./web
    environment:
      # Proxy target — resolved inside the compose network by service name
      API_TARGET: http://test-target:${PORT:-3000}
      # Reuse the API key as the web UI login password
      VITE_APP_PASSWORD: ${TEST_TARGET_API_KEY}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - test-target

volumes:
  postgres_data:
